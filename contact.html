<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sai Meghana Technical Consultants LLP — Engineering Excellence</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<!-- GSAP for Cinematic Scroll -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
  :root {
    --deep-navy: #001229;
    --midnight-blue: #002244;
    --cyan: #00adef;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: var(--midnight-blue);
    color: #ffffff;
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  
  /* 3D Canvas Container */
  #webgl-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
  }

  /* Spatial UI Overlays */
  .ui-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 3rem 4rem;
  }

  /* Header & Navigation */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    pointer-events: auto;
  }
  .brand { display: flex; align-items: center; gap: 1.2rem; }
  .logo-box {
    width: 68px;
    height: 68px;
    border: 2px solid white;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
    background: rgba(0, 34, 68, 0.4);
    backdrop-filter: blur(4px);
  }
  .brand-text h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.15em; }
  .brand-text p { font-size: 0.65rem; font-weight: 600; color: var(--cyan); letter-spacing: 0.12em; margin-top: 4px;}
  
  nav { display: flex; gap: 2.5rem; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; }
  nav a {
    color: #ffffff;
    text-decoration: none;
    transition: color 0.3s ease;
  }
  nav a:hover { color: var(--cyan); }
  nav a.active { color: var(--cyan); pointer-events: none; }

  /* Main Cinematic Content */
  .content-container {
    max-width: 700px;
    margin-top: -5vh; /* Optical centering */
  }
  .phase-label {
    font-family: monospace;
    color: var(--cyan);
    letter-spacing: 0.3em;
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }
  h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 5vw, 4.5rem);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 1.5rem;
  }
  p.desc {
    font-size: 1.1rem;
    font-weight: 300;
    color: #cbd5e1;
    line-height: 1.8;
    max-width: 550px;
  }

  /* Telemetry Footer */
  footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    width: 100%;
    border-top: 1px solid rgba(255,255,255,0.15);
    padding-top: 1.5rem;
    font-family: monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
  }
  .telemetry-left { color: #888; line-height: 1.8; }
  .telemetry-left span { color: var(--cyan); }
  .telemetry-right { display: flex; gap: 4rem; }
  .t-block { display: flex; flex-direction: column; }
  .t-block .lbl { color: #666; margin-bottom: 6px; }

  /* Invisible Scroll Proxy to drive GSAP */
  #scroll-proxy { height: 500vh; position: absolute; top: 0; width: 100%; z-index: -1; }

  /* 📱 MOBILE RESPONSIVENESS */
  @media (max-width: 768px) {
    .ui-layer { padding: 1.5rem; }
    header { flex-direction: column; align-items: flex-start; gap: 1.5rem; }
    .logo-box { width: 50px; height: 50px; }
    .brand-text h1 { font-size: 1.1rem; }
    .brand-text p { font-size: 0.55rem; }
    nav { gap: 1rem; flex-wrap: wrap; }
    
    .content-container { margin-top: 5vh; }
    h2 { font-size: 2.2rem; margin-bottom: 1rem; }
    p.desc { font-size: 0.95rem; }
    
    footer { flex-direction: column; align-items: flex-start; gap: 1.5rem; font-size: 0.65rem; padding-top: 1rem; }
    .telemetry-right { gap: 2rem; width: 100%; }
  }
</style>
</head>
<body>

<!-- The 3D World -->
<div id="webgl-container"></div>

<!-- The UI Overlay -->
<div class="ui-layer">
  <header>
    <div class="brand">
      <div class="logo-box">
        <svg viewBox="0 0 200 130" fill="none" style="width: 80%; height: 80%;">
          <g transform="translate(100, 5)">
            <polygon points="0,0 22,25 0,16" fill="#ffffff" stroke="#002147" stroke-width="2"/>
            <polygon points="0,0 -22,25 0,16" fill="#00adef" stroke="#002147" stroke-width="2"/>
            <polygon points="0,11 44,48 0,33" fill="#ffffff" stroke="#002147" stroke-width="2"/>
            <polygon points="0,11 -44,48 0,33" fill="#00adef" stroke="#002147" stroke-width="2"/>
            <polygon points="0,22 66,71 0,50" fill="#ffffff" stroke="#002147" stroke-width="2"/>
            <polygon points="0,22 -66,71 0,50" fill="#00adef" stroke="#002147" stroke-width="2"/>
          </g>
        </svg>
      </div>
      <div class="brand-text">
        <h1>SAI MEGHANA</h1>
        <p>TECHNICAL CONSULTANTS</p>
      </div>
    </div>
    <!-- REAL MULTI-PAGE HTML NAVIGATION LINKS -->
    <nav>
      <a href="index.html" id="link-index">HOME</a>
      <a href="services.html" id="link-services">SERVICES</a>
      <a href="expertise.html" id="link-expertise">EXPERTISE</a>
      <a href="about.html" id="link-about">ABOUT</a>
      <a href="contact.html" id="link-contact">CONTACT</a>
    </nav>
  </header>

  <div class="content-container" id="sec-content">
    <div class="phase-label" id="t-sub">PHASE I — BLUEPRINT VOID</div>
    <h2 id="t-head">ENGINEERING<br>EXCELLENCE</h2>
    <p class="desc" id="t-desc">A digital twin of futuristic industrial potential. We architect the unseen.</p>
  </div>

  <footer>
    <div class="telemetry-left">
      SYSTEM_STATE: <span>NOMINAL</span><br>
      LOC: HYDERABAD, TS<br>
      EST: 2+ YRS
    </div>
    <div class="telemetry-right">
      <div class="t-block"><span class="lbl">SCROLL</span><span style="color: white">TO EVOLVE</span></div>
      <div class="t-block"><span class="lbl">PHASE</span><span style="color: white" id="t-phase">01 / 05</span></div>
    </div>
  </footer>
</div>

<!-- Invisible div to create scrollbar -->
<div id="scroll-proxy"></div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────────
// SMART ROUTER & UI CONTENT DATA
// ─────────────────────────────────────────────────────────────────
const uiContent = [
  { id: "index", sub: "PHASE I — BLUEPRINT VOID", head: "ENGINEERING<br>EXCELLENCE", desc: "A digital twin of futuristic industrial potential. We architect the unseen." },
  { id: "services", sub: "PHASE II — ROBOTIC CONSTRUCTION", head: "DYNAMIC<br>ASSEMBLY", desc: "Procedural structural growth. Heavy machine foundations and internal utilities emerge." },
  { id: "expertise", sub: "PHASE III — STEEL & CONCRETE", head: "STRUCTURAL<br>GROWTH", desc: "Silos, chimneys, and industrial sheds assemble. The architecture of industry takes physical form." },
  { id: "about", sub: "PHASE IV — TELEMETRY", head: "INDUSTRIAL<br>INTELLIGENCE", desc: "Data visualization architecture. Monitoring vendor selection, contract management, and site supervision." },
  { id: "contact", sub: "PHASE V — COMPLETE", head: "SAI MEGHANA<br>LLP", desc: "2+ years of precision, integrity, and engineering authority in Hyderabad, Telangana." }
];

// Detect which page the user is currently on
const path = window.location.pathname.toLowerCase();
let startPhase = 0;
if (path.includes('services')) startPhase = 1;
else if (path.includes('expertise')) startPhase = 2;
else if (path.includes('about')) startPhase = 3;
else if (path.includes('contact')) startPhase = 4;

// Highlight the active navigation link
document.getElementById(`link-${uiContent[startPhase].id}`).classList.add('active');

// Pre-fill HTML with the correct page data instantly to prevent flickering
const initialContent = uiContent[startPhase];
document.getElementById('t-sub').innerText = initialContent.sub;
document.getElementById('t-head').innerHTML = initialContent.head;
document.getElementById('t-desc').innerText = initialContent.desc;
document.getElementById('t-phase').innerText = `0${startPhase + 1} / 05`;

// Auto-Scroll the invisible proxy so the 3D engine knows where to start
window.addEventListener('load', () => {
  if (startPhase > 0) {
    const totalScroll = document.body.scrollHeight - window.innerHeight;
    window.scrollTo(0, (startPhase / 4) * totalScroll);
  }
});

// ─────────────────────────────────────────────────────────────────
// THREE.JS ENGINE SETUP
// ─────────────────────────────────────────────────────────────────
const container = document.getElementById('webgl-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color('#002244');
scene.fog = new THREE.FogExp2('#002244', 0.015);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(30, 50, -20);
dirLight.castShadow = true;
scene.add(dirLight);

const spotLight = new THREE.SpotLight('#00adef', 3);
spotLight.position.set(-20, 20, 20);
scene.add(spotLight);

// ─────────────────────────────────────────────────────────────────
// CUSTOM GLSL SHADER: BLUEPRINT HOLOGRAM
// ─────────────────────────────────────────────────────────────────
const blueprintMaterial = new THREE.ShaderMaterial({
  uniforms: {
    time: { value: 0 },
    uColor: { value: new THREE.Color('#00adef') },
    uProgress: { value: 0.0 }
  },
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  vertexShader: `
    varying vec2 vUv; varying vec3 vPos;
    void main() { vUv = uv; vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform float time; uniform vec3 uColor; uniform float uProgress;
    varying vec2 vUv; varying vec3 vPos;
    void main() {
      vec2 grid = abs(fract(vUv * 12.0 - 0.5) - 0.5) / fwidth(vUv * 12.0);
      float line = min(grid.x, grid.y);
      float scan = sin(vPos.y * 3.0 - time * 2.0) * 0.5 + 0.5;
      float opacity = ((1.0 - min(line, 1.0)) + scan * 0.5) * (1.0 - uProgress) * 0.8;
      gl_FragColor = vec4(uColor, opacity);
    }
  `
});

const solidMaterial = new THREE.MeshStandardMaterial({
  color: 0xffffff, roughness: 0.1, metalness: 0.3, emissive: new THREE.Color('#001229'), emissiveIntensity: 0.2
});

const ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshStandardMaterial({ color: '#001229', roughness: 0.1, metalness: 0.8 }));
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.1;
ground.receiveShadow = true;
scene.add(ground);

// ─────────────────────────────────────────────────────────────────
// PROCEDURAL CAMPUS GENERATION
// ─────────────────────────────────────────────────────────────────
const campusGroup = new THREE.Group();
scene.add(campusGroup);
const buildings = [];
const gridSize = 12, spacing = 6;

for(let i=0; i<gridSize * gridSize; i++) {
  const x = (i % gridSize) - gridSize / 2;
  const z = Math.floor(i / gridSize) - gridSize / 2;
  if(Math.abs(x) < 1.5 && Math.abs(z) < 1.5) continue; 
  
  const h = Math.random() * 8 + 2;
  const isSilo = Math.random() > 0.85;
  const pos = new THREE.Vector3(x * spacing + (Math.random()-0.5)*2, 0, z * spacing + (Math.random()-0.5)*2);
  const scale = new THREE.Vector3(isSilo ? 1.5 : 2 + Math.random()*2, h, isSilo ? 1.5 : 2 + Math.random()*2);
  
  const bldg = new THREE.Group();
  bldg.position.copy(pos);
  
  const geo = isSilo ? new THREE.CylinderGeometry(scale.x, scale.x, 1, 24) : new THREE.BoxGeometry(scale.x, 1, scale.z);
  geo.translate(0, 0.5, 0); 
  
  const bpMesh = new THREE.Mesh(geo, blueprintMaterial);
  bpMesh.scale.y = scale.y;
  
  const solidMesh = new THREE.Mesh(geo, solidMaterial);
  solidMesh.scale.y = 0.01; 
  solidMesh.castShadow = solidMesh.receiveShadow = true;

  bldg.add(bpMesh); bldg.add(solidMesh);
  campusGroup.add(bldg);
  buildings.push({ bp: bpMesh, solid: solidMesh, targetHeight: scale.y, seed: Math.random() });
}

// Data Particles
const partsGeo = new THREE.BufferGeometry();
const partsPos = [];
for(let i=0; i<1500; i++) partsPos.push((Math.random()-0.5)*120, Math.random()*30, (Math.random()-0.5)*120);
partsGeo.setAttribute('position', new THREE.Float32BufferAttribute(partsPos, 3));
const particleSystem = new THREE.Points(partsGeo, new THREE.PointsMaterial({ color: '#00adef', size: 0.25, transparent: true, opacity: 0.6 }));
scene.add(particleSystem);

// ─────────────────────────────────────────────────────────────────
// GSAP SCROLL SYSTEM & STATE
// ─────────────────────────────────────────────────────────────────
gsap.registerPlugin(ScrollTrigger);
const engineState = { scrollProgress: (startPhase / 4) }; // Initialize at correct phase
let currentPhaseIndex = startPhase;

ScrollTrigger.create({
  trigger: "#scroll-proxy",
  start: "top top",
  end: "bottom bottom",
  onUpdate: (self) => {
    engineState.scrollProgress = self.progress;
    const newPhaseIndex = Math.min(4, Math.floor(self.progress * 5));
    
    if (newPhaseIndex !== currentPhaseIndex) {
      currentPhaseIndex = newPhaseIndex;
      document.getElementById('t-phase').innerText = `0${currentPhaseIndex + 1} / 05`;
      
      const content = uiContent[currentPhaseIndex];
      const secContainer = document.getElementById('sec-content');
      
      gsap.to(secContainer, { 
        opacity: 0, y: -30, duration: 0.25, ease: "power2.in",
        onComplete: () => {
          document.getElementById('t-sub').innerText = content.sub;
          document.getElementById('t-head').innerHTML = content.head;
          document.getElementById('t-desc').innerText = content.desc;
          gsap.fromTo(secContainer, { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" });
        }
      });
    }
  }
});

// ─────────────────────────────────────────────────────────────────
// CINEMATIC RENDER LOOP
// ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function lerp(start, end, amt) { return (1 - amt) * start + amt * end; }

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();
  const p = engineState.scrollProgress;

  blueprintMaterial.uniforms.time.value = time;
  blueprintMaterial.uniforms.uProgress.value = Math.max(0, Math.min(1, (p - 0.1) * 4.0));

  buildings.forEach(b => {
    const growthProgress = Math.max(0, Math.min(1, (p - 0.25 - b.seed * 0.15) * 3.0));
    b.solid.scale.y = (1 - Math.pow(1 - growthProgress, 3)) * b.targetHeight + 0.01;
  });

  const targetCamX = lerp(0, -15, p);
  const targetCamY = lerp(40, 3, p);
  const targetCamZ = lerp(50, 15, p);
  
  // Quick jump if rendering first frame to avoid camera flying from 0 on load
  camera.position.lerp(new THREE.Vector3(targetCamX, targetCamY, targetCamZ), time < 0.1 ? 1 : 0.04);

  const targetLookX = lerp(0, 10, p);
  const targetLookY = lerp(0, 8, p);
  const targetLookZ = lerp(0, -10, p);
  
  const currentLookAt = new THREE.Vector3();
  camera.getWorldDirection(currentLookAt);
  const targetLookAt = new THREE.Vector3(targetLookX, targetLookY, targetLookZ);
  camera.lookAt(camera.position.clone().add(currentLookAt.lerp(targetLookAt.sub(camera.position), time < 0.1 ? 1 : 0.04)));

  scene.fog.density = lerp(0.015, 0.005, p);
  particleSystem.rotation.y = time * 0.03;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
